# Category mappings for Cannon's Auctions (Maxanet)
#
# Two layers:
# 1. raw_aliases: maps messy site category names -> canonical display names
# 2. groups: maps canonical names -> broad groups (via substring matching)
# 3. description_keywords: infers category from item description when raw category is missing
#
# Edit this file to adjust categorization. The scraper reads it at runtime.

