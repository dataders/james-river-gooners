<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cannon's Auctions — Dashboard</title>
<style>
  :root {
    --red: #E8102B;
    --dark-red: #8b0000;
    --gold: #FBBA34;
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --text: #f0f0f0;
    --muted: #888;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--dark-red) 0%, var(--red) 100%);
    padding: 1.25rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.02em; }
  header p { font-size: 0.8rem; opacity: 0.8; margin-top: 0.15rem; }
  .cannon-icon { font-size: 2rem; }

  main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.25rem;
  }
  .stat-card .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.4rem; }
  .stat-card .value { font-size: 2rem; font-weight: 700; line-height: 1; }
  .stat-card .sub { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }
  .stat-card.gold .value { color: var(--gold); }
  .stat-card.red .value { color: var(--red); }
  .stat-card.green .value { color: var(--green); }

  h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }

  .timeline { position: relative; margin-bottom: 1.5rem; }
  .timeline-bar-track {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    padding: 0.75rem;
    display: flex; gap: 3px; align-items: flex-end; height: 100px;
  }
  .bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    background: var(--red);
    min-height: 6px;
    opacity: 0.85;
    position: relative;
    cursor: default;
    transition: opacity 0.15s;
  }
  .bar:hover { opacity: 1; }
  .bar .tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.4rem 0.6rem;
    font-size: 0.72rem;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }
  .bar:hover .tip { display: block; }

  .auctions-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .auction-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    display: grid;
    grid-template-columns: 3.5rem 1fr auto;
    align-items: center;
    gap: 1rem;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .auction-card:hover { border-color: var(--red); background: var(--surface2); }
  .day-badge {
    text-align: center;
    background: var(--dark-red);
    border-radius: 8px;
    padding: 0.4rem 0.2rem;
  }
  .day-badge .day-num { font-size: 1.4rem; font-weight: 700; line-height: 1; color: var(--gold); }
  .day-badge .day-name { font-size: 0.62rem; text-transform: uppercase; color: #fff8; letter-spacing: 0.05em; }

  .auction-info .title {
    font-size: 0.88rem;
    font-weight: 600;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .auction-info .meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.25rem; }

  .item-count {
    text-align: right;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--gold);
    white-space: nowrap;
  }
  .item-count span { display: block; font-size: 0.65rem; font-weight: 400; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

  .loading { text-align: center; color: var(--muted); padding: 3rem; font-size: 0.9rem; }
  .error { text-align: center; color: var(--red); padding: 3rem; font-size: 0.9rem; }

  footer { text-align: center; padding: 2rem; color: var(--muted); font-size: 0.75rem; }
  footer a { color: var(--red); text-decoration: none; }

  .scrape-badge {
    display: inline-flex; align-items: center; gap: 0.3rem;
    font-size: 0.7rem; color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0.2rem 0.6rem;
    margin-left: auto;
  }
  .dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<header>
  <div class="cannon-icon">🏛️</div>
  <div>
    <h1>Cannon's Auctions — Dashboard</h1>
    <p>James River Gooners · Richmond VA</p>
  </div>
</header>

<main>
  <div id="app"><div class="loading">Loading auction data…</div></div>
</main>

<footer>
  Data from <a href="https://maxanet.com" target="_blank">Maxanet</a> via the
  <a href="https://dataders.github.io/james-river-gooners/" target="_blank">James River Gooners</a> scraper.
</footer>

<script>
const BASE = 'https://dataders.github.io/james-river-gooners/';
const MANIFEST = BASE + 'data/manifest.json';
const CANNON_BASE = 'https://www.maxanet.com/';

function parseDate(str) {
  // "2026-05-31 6:18:00 PM"
  return new Date(str.replace(' ', 'T').replace(/(AM|PM)$/, m => m === 'PM' ? '' : ''));
}

function friendlyTitle(raw) {
  // Strip trailing "- Cannon's Online Auctions, LLC"
  return raw.replace(/\s*[-–]\s*Cannon['']s Online Auctions,?\s*LLC\s*$/i, '').trim();
}

function relativeTime(date) {
  const diff = date - Date.now();
  const h = Math.floor(diff / 36e5);
  if (h < 0) return 'Ended';
  if (h < 24) return `Ends in ${h}h`;
  const d = Math.floor(h / 24);
  return `${d} day${d !== 1 ? 's' : ''} left`;
}

async function load() {
  try {
    const resp = await fetch(MANIFEST);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const { auctions } = await resp.json();

    const sorted = [...auctions].sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
    const totalItems = auctions.reduce((s, a) => s + a.itemCount, 0);
    const newestScrape = auctions.reduce((latest, a) =>
      a.scrapedAt > latest ? a.scrapedAt : latest, '');

    const maxItems = Math.max(...auctions.map(a => a.itemCount));

    document.getElementById('app').innerHTML = `
      <div class="stats-row">
        <div class="stat-card gold">
          <div class="label">Active Auctions</div>
          <div class="value">${auctions.length}</div>
          <div class="sub">closing soon</div>
        </div>
        <div class="stat-card red">
          <div class="label">Total Lots</div>
          <div class="value">${totalItems.toLocaleString()}</div>
          <div class="sub">across all auctions</div>
        </div>
        <div class="stat-card green">
          <div class="label">Next Closing</div>
          <div class="value" style="font-size:1.1rem;padding-top:0.4rem">${friendlyTitle(sorted[0].title).split(':').slice(1,2).join(':').trim().split('|')[0].trim() || 'Soon'}</div>
          <div class="sub">${relativeTime(new Date(sorted[0].endDate.replace(' ', 'T')))}</div>
        </div>
        <div class="stat-card" style="align-items:flex-start">
          <div class="label">Last Scraped</div>
          <div style="font-size:0.85rem;margin-top:0.3rem">
            ${new Date(newestScrape).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}
          </div>
          <div class="sub">auto-updates hourly</div>
        </div>
      </div>

      <h2>Items per auction</h2>
      <div class="timeline" style="margin-bottom:1.5rem">
        <div class="timeline-bar-track" aria-label="Items per auction bar chart">
          ${sorted.map(a => {
            const pct = Math.max(6, Math.round((a.itemCount / maxItems) * 72));
            const d = new Date(a.endDate.replace(' ', 'T'));
            const label = d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
            return `<div class="bar" style="height:${pct}px;background:hsl(${350 - Math.round(a.itemCount/maxItems*30)},80%,${35 + Math.round(a.itemCount/maxItems*20)}%)">
              <div class="tip">${label}<br>${a.itemCount} lots</div>
            </div>`;
          }).join('')}
        </div>
      </div>

      <h2>Upcoming auctions</h2>
      <div class="auctions-list">
        ${sorted.map(a => {
          const d = new Date(a.endDate.replace(' ', 'T'));
          const dayNum = d.getDate();
          const dayName = d.toLocaleDateString('en-US', { weekday:'short' });
          const timeLeft = relativeTime(d);
          const title = friendlyTitle(a.title);
          const displayTitle = title.includes(':') ? title.split(':').slice(1).join(':').trim() : title;
          const endTime = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
          return `<div class="auction-card">
            <div class="day-badge">
              <div class="day-num">${dayNum}</div>
              <div class="day-name">${dayName}</div>
            </div>
            <div class="auction-info">
              <div class="title">${displayTitle}</div>
              <div class="meta">Closes ${endTime} · ${timeLeft}</div>
            </div>
            <div class="item-count">${a.itemCount}<span>lots</span></div>
          </div>`;
        }).join('')}
      </div>
    `;
  } catch (err) {
    document.getElementById('app').innerHTML =
      `<div class="error">Failed to load manifest: ${err.message}<br><small>Is the scraper running?</small></div>`;
  }
}

load();
</script>
</body>
</html>
