name: Scrape Auction Data

on:
  schedule:
    - cron: '0 */2 * * *'  # Every 2 hours
  workflow_dispatch:
    inputs:
      auction_url:
        description: 'Full Cannon''s auction URL (or leave empty to discover and scrape current auctions)'
        required: false
        type: string
      dry_run:
        description: 'Test only — scrape but do not commit'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Scrape auction(s)
        run: |
          cd scraper
          if [ -n "${MOTHERDUCK_TOKEN:-}" ]; then
            export GOONERS_MOTHERDUCK_SNAPSHOTS=1
          fi
          if [ -n "${{ inputs.auction_url }}" ]; then
            echo "Scraping single auction..."
            uv run --with requests --with beautifulsoup4 --with pyarrow --with pyyaml --with 'duckdb==1.5.2' \
              python scrape.py "${{ inputs.auction_url }}"
          else
            echo "Re-scraping all auctions from manifest..."
            uv run --with requests --with beautifulsoup4 --with pyarrow --with pyyaml --with 'duckdb==1.5.2' \
              python rescrape_all.py
          fi

      - name: Rebuild manifests
        run: |
          cd scraper
          uv run --with requests --with beautifulsoup4 --with pyarrow --with pyyaml \
            python -c "from rescrape_all import update_manifests; update_manifests()"

      - name: Export eBay comps from MotherDuck
        run: |
          if [ -z "${MOTHERDUCK_TOKEN:-}" ]; then
            echo "Skipping eBay comp export because MOTHERDUCK_TOKEN is not configured"
            exit 0
          fi
          cd scraper
          uv run --with 'duckdb==1.5.2' \
            python ebay_comps.py export --allow-missing

      - name: Commit and push
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet || git commit -m "data: update scraped auction data [$(date -u +%Y-%m-%dT%H:%M)]"
          git push
