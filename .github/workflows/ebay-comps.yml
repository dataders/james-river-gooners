name: Refresh eBay Comps

# Comps-only workflow: fetches eBay sold-comp prices and updates the static
# JSON read model under public/data/ebay-comps/. Does NOT re-scrape auctions or
# rebuild manifests — use the "Scrape Auction Data" workflow for that.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Test only — fetch but do not commit'
        required: false
        type: boolean
        default: false
      limit:
        description: 'Max number of items to attempt this run'
        required: false
        type: string
        default: '2000'
      max_queries:
        description: 'Hard cap on requests this run (0 = none; monthly budget still applies)'
        required: false
        type: string
        default: '0'
      monthly_budget:
        description: 'Shared monthly request ceiling across all runs (0 disables)'
        required: false
        type: string
        default: '2000'
      queries_per_item:
        description: 'Fallback queries per item (1=cheapest, 3=best match rate)'
        required: false
        type: string
        default: '2'
      refresh_existing:
        description: 'Also re-fetch items already attempted (off = backfill only)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  comps:
    runs-on: ubuntu-latest
    env:
      MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
      SOLDCOMPS_API_KEY: ${{ secrets.SOLDCOMPS_API_KEY }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install agent-browser Playwright deps
        run: |
          npm exec --yes agent-browser@0.27.0 -- install
        env:
          npm_config_cache: ${{ runner.temp }}/npm-agent-browser
          AGENT_BROWSER_ARGS: --no-sandbox,--disable-blink-features=AutomationControlled

      - name: Refresh eBay comps
        env:
          npm_config_cache: ${{ runner.temp }}/npm-agent-browser
          AGENT_BROWSER_ARGS: --no-sandbox,--disable-blink-features=AutomationControlled
          AGENT_BROWSER_SESSION: gooners-ebay-comps
        run: |
          cd scraper
          # The static JSON read model is the source of truth; MotherDuck is an
          # optional mirror, enabled only when a token is configured.
          if [ -n "${MOTHERDUCK_TOKEN:-}" ]; then
            export GOONERS_MOTHERDUCK_SNAPSHOTS=1
          fi
          # Backfill by default (skip already-attempted items); flip
          # refresh_existing on to re-fetch comps that already exist.
          SKIP_FLAG="--skip-attempted"
          if [ "${{ inputs.refresh_existing }}" = "true" ]; then
            SKIP_FLAG=""
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run: planning eBay comp fetch without writes"
            uv run --with requests --with beautifulsoup4 --with pyarrow --with 'duckdb==1.5.2' \
              python ebay_comps.py fetch-direct --dry-run --limit 1 --sleep-seconds 0 \
                --monthly-budget "${{ inputs.monthly_budget }}" \
                --queries-per-item "${{ inputs.queries_per_item }}" $SKIP_FLAG
          else
            uv run --with requests --with beautifulsoup4 --with pyarrow --with 'duckdb==1.5.2' \
              python ebay_comps.py fetch-direct \
                --limit "${{ inputs.limit }}" \
                --max-queries "${{ inputs.max_queries }}" \
                --monthly-budget "${{ inputs.monthly_budget }}" \
                --queries-per-item "${{ inputs.queries_per_item }}" $SKIP_FLAG
          fi

      - name: Commit and push
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ebay-comps/
          if git diff --staged --quiet; then
            echo "No eBay comp changes to commit"
            exit 0
          fi
          git commit -m "data: refresh eBay comps [$(date -u +%Y-%m-%dT%H:%M)]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push failed; rebasing on origin/main before retry ${attempt}"
            git fetch origin main
            git rebase origin/main
          done
          git push
